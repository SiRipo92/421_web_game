<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!--
    421 Bistro favicon. Brand purple inherited from the previous logo,
    set as a tile with "421" in a heavy serif so users instantly know
    what tab they're looking at. No blur filters — the previous version's
    glow looked great at 256px but muddied at 16x16 (browser tab size).
  -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9b5fff"/>
      <stop offset="1" stop-color="#6f10ff"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="12" fill="url(#bg)"/>
  <text x="32" y="44"
        font-family="Georgia, 'Playfair Display', 'Times New Roman', serif"
        font-size="32" font-weight="900"
        fill="#F4ECD8" text-anchor="middle" letter-spacing="-1.5">421</text>
</svg>
