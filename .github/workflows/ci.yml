name: CI

on:
  push:
    branches: [main, develop]
    paths-ignore: ["**.md", ".gitignore", "LICENSE"]
  pull_request:
    branches: [main, develop]
    paths-ignore: ["**.md", ".gitignore", "LICENSE"]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: "**/requirements*.txt"
      - run: pip install ruff
      - run: ruff check app/ tests/
      - run: ruff format --check app/ tests/
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run lint
        working-directory: frontend

  test:
    name: Tests + coverage ≥ 80%
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: test
          # Database name contains "test" so tests/conftest.py's safety
          # guard (refuses to run if URL doesn't include "test") passes
          # in CI without further tweaks.
          POSTGRES_DB: fourtwentyone_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: "**/requirements*.txt"
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - name: Run Alembic migrations
        run: alembic upgrade head
        env:
          DATABASE_URL: "postgresql+asyncpg://app:test@localhost:5432/fourtwentyone_test"
      - name: Run all tests with coverage
        # tests/conftest.py swaps DATABASE_URL → TEST_DATABASE_URL at
        # import time. In CI both point at the same DB (we only have one
        # service), but the env var has to be set for the safety guard
        # to let the suite run.
        run: pytest tests/ -v --cov=app --cov-fail-under=80 --cov-report=xml --cov-report=term-missing
        env:
          DATABASE_URL: "postgresql+asyncpg://app:test@localhost:5432/fourtwentyone_test"
          TEST_DATABASE_URL: "postgresql+asyncpg://app:test@localhost:5432/fourtwentyone_test"
          SECRET_KEY: "ci-test-secret-key-not-for-production"
          DEBUG: "true"

  audit:
    # G100a (G92c follow-up): surface CVE advisories on every PR. Not
    # blocking — we want visibility without a failed build interrupting
    # urgent work. Flip `continue-on-error` to false once the baseline is
    # clean and you want to treat new advisories as a merge block.
    name: Dependency audit (non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: "**/requirements*.txt"
      - run: pip install pip-audit
      - name: pip-audit
        run: pip-audit -r requirements.txt --disable-pip --strict

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - name: npm audit
        # `--audit-level=high` only fails on high/critical advisories.
        # Low/moderate findings are logged but not surfaced as errors —
        # they're tracked separately in the periodic security review.
        run: npm audit --audit-level=high
        working-directory: frontend

# Image building is delegated to Fly.io's remote builders via
# .github/workflows/deploy.yml. We don't publish to Docker Hub:
#   - one credential to manage (FLY_API_TOKEN), not three
#   - faster CI on main pushes (no redundant build)
#   - the viewing-only LICENSE forbids redistribution; a public
#     Docker Hub image would undo that
# See docs/DEPLOY_SETUP.md for the deploy flow.
