name: CI

on:
  push:
    branches: [main, develop, "feature/**"]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check app/ tests/
      - run: ruff format --check app/ tests/

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - run: pytest tests/unit/ -v --cov=app --cov-report=xml --cov-report=term-missing
        env:
          DATABASE_URL: "postgresql+asyncpg://app:test@localhost:5432/fourtwentyone"
          SECRET_KEY: "ci-test-secret-key-not-for-production"
          DEBUG: "true"

  integration-tests:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: test
          POSTGRES_DB: fourtwentyone
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt -r requirements-dev.txt psycopg2-binary
      - name: Run Alembic migrations
        run: alembic upgrade head
        env:
          DATABASE_URL: "postgresql+asyncpg://app:test@localhost:5432/fourtwentyone"
      - run: pytest tests/integration/ -v --cov=app --cov-append --cov-report=xml --cov-report=term-missing
        env:
          DATABASE_URL: "postgresql+asyncpg://app:test@localhost:5432/fourtwentyone"
          SECRET_KEY: "ci-test-secret-key-not-for-production"
          DEBUG: "true"

  coverage-gate:
    name: Coverage ≥ 80%
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt -r requirements-dev.txt psycopg2-binary
      - name: Run Alembic migrations
        run: alembic upgrade head
        env:
          DATABASE_URL: "postgresql+asyncpg://app:test@localhost:5432/fourtwentyone"
      - name: Re-run all tests with combined coverage
        run: pytest tests/ --cov=app --cov-fail-under=80 --cov-report=term-missing
        env:
          DATABASE_URL: "postgresql+asyncpg://app:test@localhost:5432/fourtwentyone"
          SECRET_KEY: "ci-test-secret-key-not-for-production"
          DEBUG: "true"
        continue-on-error: false
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: test
          POSTGRES_DB: fourtwentyone
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
