name: E2E (Playwright)

# G99: end-to-end tests run on PRs + main to catch regressions in the
# user-facing journeys that pytest can't reach (real browser, real DOM,
# real WS connection). The build is heavier than `ci.yml` so we skip it
# on docs-only changes.
on:
  push:
    branches: [main, develop]
    paths-ignore: ["**.md", ".gitignore", "LICENSE", "docs/**"]
  pull_request:
    branches: [main, develop]
    paths-ignore: ["**.md", ".gitignore", "LICENSE", "docs/**"]

jobs:
  e2e:
    name: Playwright suite
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: test
          POSTGRES_DB: fourtwentyone_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: "**/requirements*.txt"
      - run: pip install -r requirements.txt
      - name: Alembic upgrade
        run: alembic upgrade head
        env:
          DATABASE_URL: "postgresql+asyncpg://app:test@localhost:5432/fourtwentyone_test"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: frontend

      - name: Run Playwright tests
        run: npx playwright test
        working-directory: frontend
        env:
          CI: "1"
          E2E_DATABASE_URL: "postgresql+asyncpg://app:test@localhost:5432/fourtwentyone_test"
          SECRET_KEY: "ci-test-secret-key-not-for-production"
          DEBUG: "true"

      # Always upload the HTML report so failures are debuggable from
      # the GHA Actions tab even when the workflow fails.
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
