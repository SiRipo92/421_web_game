name: Secret scan

# Guard against committed credentials. Triggered on every PR and on
# push to protected branches. Uses gitleaks with the default ruleset
# (catches AWS keys, GCP service accounts, JWTs, Postgres URLs with
# embedded passwords, private SSH keys, etc.).
#
# If gitleaks finds a candidate secret, the job fails. To suppress a
# false positive, add the file pattern to .gitleaksignore at the repo
# root. To suppress a specific line, add `# gitleaks:allow` at the
# end of the line.
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Fetch full history so gitleaks can scan every commit, not
          # just the PR head. Without depth=0, only the latest commit
          # is scanned and historical leaks slip through.
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # If you want a paid org licence for the SaaS dashboard,
          # uncomment + add the secret. The OSS scan in this job is
          # enough for personal projects.
          # GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
