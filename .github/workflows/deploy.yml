name: Deploy to Fly.io

# G100a: deploy after CI passes on main. Triggers via `workflow_run` after
# ci.yml completes successfully on the main branch — so we never deploy
# code that hasn't passed lint + tests. Manual dispatch also supported
# for hotfix scenarios.
#
# Setup runbook: docs/DEPLOY_SETUP.md
#
# Required secret in repo settings:
#   FLY_API_TOKEN — generated via `fly tokens create deploy`
#
# If the secret is unset (e.g. before first-time setup), the job exits 0
# with a clear message instead of failing the workflow.
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

# Prevent overlapping deploys racing each other.
concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    name: flyctl deploy
    runs-on: ubuntu-latest
    # workflow_run fires on every completed CI run regardless of outcome;
    # only proceed if the upstream succeeded (manual dispatch always proceeds).
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Guard — skip if FLY_API_TOKEN is not configured
        id: token_check
        run: |
          if [ -z "${{ secrets.FLY_API_TOKEN }}" ]; then
            echo "::notice::FLY_API_TOKEN secret is not set — skipping deploy."
            echo "::notice::Follow docs/DEPLOY_SETUP.md §3 to wire it up."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install flyctl
        if: steps.token_check.outputs.skip != 'true'
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy
        if: steps.token_check.outputs.skip != 'true'
        run: flyctl deploy --remote-only --wait-timeout 300
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
