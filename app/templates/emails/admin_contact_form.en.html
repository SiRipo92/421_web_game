{% extends "_base.html" %}
{% block body %}
<table role="presentation" cellpadding="0" cellspacing="0" border="0" style="width:100%;font-size:14px;">
  <tr><td style="padding:4px 0;color:#6B5A4A;width:90px;">From:</td><td style="padding:4px 0;"><strong>{{ name }}</strong> &lt;{{ from_email }}&gt;</td></tr>
  <tr><td style="padding:4px 0;color:#6B5A4A;">Category:</td><td style="padding:4px 0;">{{ category_label }}</td></tr>
</table>
<hr style="border:0;border-top:1px solid #ECE0C2;margin:20px 0;">
<div style="background:#F4ECD8;padding:16px 20px;border-radius:4px;border-left:3px solid #A8302A;font-size:14px;line-height:1.6;white-space:pre-wrap;">{{ message }}</div>
<p style="margin:24px 0 0 0;font-size:12px;color:#6B5A4A;">To reply, use your mail client's reply function — the sender's address is already filled in.</p>
{% endblock %}
