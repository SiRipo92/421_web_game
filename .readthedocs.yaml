# ReadTheDocs configuration for 421 Bistro.
# Docs: https://docs.readthedocs.com/platform/stable/config-file/v2.html

version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.12"

sphinx:
  configuration: docs/source/conf.py
  fail_on_warning: false  # autodoc warns on missing docstrings; don't block

python:
  install:
    # autodoc imports the real app/ package; we need its runtime deps so
    # SQLAlchemy / pydantic / etc. resolve. Hence both requirements files.
    - requirements: requirements.txt
    - requirements: requirements-dev.txt

formats:
  - htmlzip
  - pdf
