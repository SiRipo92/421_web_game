# Fly.io app config. `fly launch` will overwrite the app name + primary_region
# when you first run it locally — see docs/DEPLOY_SETUP.md.
#
# This stub commits a known-good shape so `fly deploy` in CI has a real file
# to read even before the local `fly launch` happens. Once you run the
# launch flow, you can either keep this file or let Fly regenerate it.

app = "421-bistro"
primary_region = "cdg"
kill_signal = "SIGINT"
kill_timeout = "30s"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8421"
  # All other env vars (SECRET_KEY, DATABASE_URL, BREVO_API_KEY, etc.)
  # come from `fly secrets set` — see DEPLOY_SETUP.md §2.

[http_service]
  internal_port = 8421
  force_https = true
  auto_stop_machines = "stop"     # save free-tier hours by stopping idle machines
  auto_start_machines = true       # restart on first incoming request
  min_machines_running = 0         # allow scale-to-zero
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 250

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  timeout = "5s"
  path = "/healthz"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
