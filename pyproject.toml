[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I"]

[tool.ruff.lint.per-file-ignores]
"app/main.py" = ["E402"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "session"
asyncio_default_test_loop_scope = "session"
testpaths = ["tests"]

[tool.coverage.run]
# SQLAlchemy's asyncio extension uses greenlets internally; without this,
# coverage's sys.settrace probe stops firing after the first greenlet switch,
# making every line after `await db.execute(...)` appear uncovered on Python 3.12.
concurrency = ["greenlet", "thread"]
